# docker-compose cho pi-reviewer-bot — LOCAL DEBUG only.
#
# Bot chạy như GitLab CI job (D1-revised) — KHÔNG còn long-running server.
# File này chỉ để chạy image locally với mock CI env (từ .env) khi debug.
#
# Usage:
#   1. Copy .env.example → .env, điền GITLAB_API_TOKEN + LLM key + mock CI vars
#   2. docker compose run --rm pi-reviewer-bot
#
# Production: KHÔNG deploy qua compose. CI runner pull image từ GHCR + chạy job.

services:
  pi-reviewer-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: pi-reviewer-bot:debug
    env_file: .env
    # Bot là CLI 1-shot: `run` (không `-d`, không restart policy).
    # Cần repo source branch được mount vào cwd để fetch_file tool đọc.
    volumes:
      - .:/workspace:ro
    working_dir: /workspace
    command: ["/app/pi-reviewer-bot"]
