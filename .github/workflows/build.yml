# ─────────────────────────────────────────────────────────────
# Build & push pi-reviewer-bot image lên GitHub Container Registry
#
# Multi-arch build (amd64 + arm64) qua buildx trong 1 job duy nhất.
# buildx tự tạo manifest list chứa cả 2 arch.
#
# Trigger:
#   - Push tag `v*`     → build + push, tag image với version + latest
#   - Push branch main  → build + push, tag image với `main` (rolling)
#   - PR                → build only (không push), verify Dockerfile không vỡ
#
# Image output: ghcr.io/naicoi92/pi-reviewer-bot:{tag}
# ─────────────────────────────────────────────────────────────

name: build-image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (cần cho cross-arch build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag strategy:
          #   v1.2.3 → :1.2.3, :v1.2.3, :1.2, :1, :latest
          #   main   → :main
          #   PR     → :pr-<number> (no push)
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=pi-reviewer-bot
            org.opencontainers.image.description=GitLab webhook bot — AI code review with Pi SDK + any LLM provider
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch single invocation)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Buildx tự build cả 2 arch + tạo manifest list multi-arch
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers giữa các build (rất tiết kiệm thời gian)
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && 'type=registry,ref=ghcr.io/naicoi92/pi-reviewer-bot:buildcache,mode=max' || '' }}
          provenance: false  # simpler manifest, tránh lỗi buildx với provenance attestations
